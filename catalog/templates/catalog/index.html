<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Магазин — Каталог товаров</title>
</head>
<body>
    <h1>Каталог товаров</h1>

    {% if items %}
        <ul>
            {% for item in items %}
                <li>
                    <strong>{{ item.title }}</strong> — {{ item.price }} ₴
                    <p>{{ item.description }}</p>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Товаров пока нет.</p>
    {% endif %}
</body>
</html>
