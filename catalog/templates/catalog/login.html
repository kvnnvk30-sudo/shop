{% extends 'catalog/base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%;">
        <div class="card-body p-4" style="background: linear-gradient(135deg, #4a5a6a, #2c3a47); border-radius: 8px;">
            <form method="post">
                {% csrf_token %}

                <div class="input-group mb-3">
                    <span class="input-group-text bg-secondary text-white border-0"><i class="fa-solid fa-user"></i></span>
                    {{ form.username }}
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text bg-secondary text-white border-0"><i class="fa-solid fa-lock"></i></span>
                    {{ form.password }}
                </div>

                {% if form.errors %}
                    <div class="alert alert-danger py-2">Неверный логин или пароль</div>
                {% endif %}

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-white-50 small" for="remember">Запомнить меня</label>
                    </div>
                    <a href="#" class="small text-white-50">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn btn-light w-100 fw-bold">ВОЙТИ</button>

                <p class="text-center text-white-50 mt-3 mb-0 small">
                    Нет аккаунта? <a href="{% url 'catalog:register' %}" class="text-white">Зарегистрироваться</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
<style>
    input[type="text"], input[type="password"] {
        background-color: #5a6b7a;
        border: none;
        color: white;
    }
    input[type="text"]::placeholder, input[type="password"]::placeholder {
        color: #cdd5db;
    }
    input[type="text"]:focus, input[type="password"]:focus {
        background-color: #5a6b7a;
        color: white;
        box-shadow: none;
    }
    .form-check-input:checked {
        background-color: #6c8eae;
        border-color: #6c8eae;
    }
</style>
