{% extends 'catalog/base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%;">
        <div class="card-body p-4" style="background: linear-gradient(135deg, #4a5a6a, #2c3a47); border-radius: 8px;">
            <h4 class="text-white text-center mb-4">Регистрация</h4>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-light w-100 fw-bold">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                <p class="text-center text-white-50 mt-3 mb-0 small">
                    Уже есть аккаунт? <a href="{% url 'catalog:login' %}" class="text-white">Войти</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
